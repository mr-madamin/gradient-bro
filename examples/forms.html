<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gradient Bro Form Integration</title>
    <link rel="stylesheet" href="../dist/gradient-bro.css">
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #eef2f8;
        color: #172033;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(860px, calc(100vw - 32px));
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 24px;
        align-items: start;
      }

      form {
        display: grid;
        gap: 12px;
        padding: 18px;
        background: #fff;
        border: 1px solid #d9dee8;
        border-radius: 8px;
        box-shadow: 0 18px 45px rgba(17, 24, 39, 0.1);
      }

      label {
        display: grid;
        gap: 6px;
        color: #697386;
        font-size: 12px;
        font-weight: 650;
        text-transform: uppercase;
      }

      input,
      textarea {
        width: 100%;
        box-sizing: border-box;
        padding: 9px 10px;
        color: #172033;
        border: 1px solid #d9dee8;
        border-radius: 6px;
        font: inherit;
      }

      textarea {
        min-height: 84px;
        resize: vertical;
      }

      .preview {
        min-height: 130px;
        border-radius: 8px;
        background: linear-gradient(120deg, #ef4444 0%, #06b6d4 100%);
      }

      @media (max-width: 760px) {
        body { place-items: start center; padding: 16px 0; }
        main { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="picker"></div>
      <form>
        <div class="preview" id="preview"></div>
        <label>
          Theme name
          <input name="name" value="Launch banner">
        </label>
        <label>
          Stored gradient value
          <textarea name="gradient" id="gradient-field"></textarea>
        </label>
      </form>
    </main>
    <script type="module">
      import { GradientBro } from "../dist/index.js";

      const preview = document.querySelector("#preview");
      const field = document.querySelector("#gradient-field");
      const picker = new GradientBro("#picker", {
        mode: "gradient",
        value: "linear-gradient(120deg, #ef4444 0%, #06b6d4 100%)",
        onChange(value) {
          preview.style.background = value;
          field.value = value;
        }
      });

      field.value = picker.getValue();
    </script>
  </body>
</html>
