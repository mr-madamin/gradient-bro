<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gradient Bro Basic Color</title>
    <link rel="stylesheet" href="../dist/gradient-bro.css">
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #eef2f8;
        color: #172033;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(820px, calc(100vw - 32px));
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 24px;
        align-items: start;
      }

      .preview {
        min-height: 320px;
        padding: 24px;
        display: grid;
        align-content: end;
        color: #fff;
        background: #ff4d6d;
        border-radius: 8px;
        box-shadow: 0 18px 45px rgba(17, 24, 39, 0.14);
      }

      code {
        display: block;
        margin-top: 12px;
        padding: 12px;
        overflow-wrap: anywhere;
        color: #172033;
        background: #fff;
        border: 1px solid #d9dee8;
        border-radius: 8px;
      }

      @media (max-width: 760px) {
        body { place-items: start center; padding: 16px 0; }
        main { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main>
      <div id="picker"></div>
      <section>
        <div class="preview" id="preview">
          <strong>Live color preview</strong>
          <code id="value"></code>
        </div>
      </section>
    </main>
    <script type="module">
      import { GradientBro } from "../dist/index.js";

      const preview = document.querySelector("#preview");
      const output = document.querySelector("#value");
      const picker = new GradientBro("#picker", {
        mode: "color",
        value: "#ff4d6d",
        format: "hex",
        onChange(value) {
          preview.style.background = value;
          output.textContent = value;
        }
      });

      output.textContent = picker.getValue();
    </script>
  </body>
</html>
